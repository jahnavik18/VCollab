<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Meeting - VCollab</title>

    <link rel="stylesheet" href="css/join-meeting.css">
</head>

<body>

    <div class="container">

        <div class="join-box">

            <h1>Join Meeting</h1>

            <p>Enter your meeting details to join.</p>

            <form id="joinForm" autocomplete="off">

                <label>Meeting ID</label>
                <input 
                    type="text" 
                    id="meetingId" 
                    name="meetingId"
                    placeholder="Enter Meeting ID"
                    autocomplete="new-password"
                    required>

                <label>Passcode</label>
                <input 
                    type="password" 
                    id="passcode"
                    name="passcode"
                    placeholder="Enter Passcode"
                    autocomplete="new-password"
                    required>

                <button type="submit">Join Meeting</button>

            </form>

            <a href="dashboard.html" class="back-btn">← Back to Dashboard</a>

        </div>

    </div>

    <script src="js/join-meeting.js"></script>

</body>

</html>
